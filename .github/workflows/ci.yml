name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  container-checks:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      OPENAI_COMPAT_API_KEY: ${{ secrets.OPENAI_COMPAT_API_KEY }}
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t media-metadata-dataset:ci .

      - name: CLI smoke
        run: docker run --rm media-metadata-dataset:ci mod --help

      - name: Credential wiring smoke
        if: ${{ env.CLOUDFLARE_ACCOUNT_ID != '' && env.CLOUDFLARE_API_TOKEN != '' && env.OPENAI_COMPAT_API_KEY != '' }}
        run: |
          docker run --rm \
            -e CLOUDFLARE_ACCOUNT_ID \
            -e CLOUDFLARE_API_TOKEN \
            -e OPENAI_COMPAT_API_KEY \
            media-metadata-dataset:ci \
            mod credentials-smoke

      - name: Ruff
        run: docker run --rm media-metadata-dataset:ci ruff check .

      - name: Pyright
        run: docker run --rm media-metadata-dataset:ci pyright

      - name: Contract tests
        run: docker run --rm media-metadata-dataset:ci ./scripts/ci/run_contract_tests.sh

      - name: Dataset tests
        run: docker run --rm media-metadata-dataset:ci ./scripts/ci/run_dataset_tests.sh

      - name: Generate dataset smoke artifacts
        run: |
          mkdir -p .mod/out
          docker run --rm \
            -v "${{ github.workspace }}/.mod/out:/app/.mod/out" \
            media-metadata-dataset:ci \
            ./scripts/ci/run_artifact_smokes.sh

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dataset-smoke-artifacts
          path: .mod/out
