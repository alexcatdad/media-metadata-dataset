steps:
  build:
    image: docker:29-cli
    commands:
      - docker build -t media-metadata-dataset:ci .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  ruff:
    image: docker:29-cli
    commands:
      - docker run --rm media-metadata-dataset:ci ruff check .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  pyright:
    image: docker:29-cli
    commands:
      - docker run --rm media-metadata-dataset:ci pyright
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  contract-tests:
    image: docker:29-cli
    commands:
      - docker run --rm media-metadata-dataset:ci ./scripts/ci/run_contract_tests.sh
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  dataset-tests:
    image: docker:29-cli
    commands:
      - docker run --rm media-metadata-dataset:ci ./scripts/ci/run_dataset_tests.sh
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  dataset-smoke-artifacts:
    image: docker:29-cli
    commands:
      - mkdir -p .mod/out
      - docker run --rm -v "$PWD/.mod/out:/app/.mod/out" media-metadata-dataset:ci ./scripts/ci/run_artifact_smokes.sh
      - find .mod/out -maxdepth 2 -type f | sort
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
