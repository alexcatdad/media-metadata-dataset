steps:
  build:
    image: docker:29-cli
    commands:
      - docker build -t media-metadata-dataset:ci .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  ruff:
    image: docker:29-cli
    commands:
      - docker run --rm media-metadata-dataset:ci ruff check .
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  pyright:
    image: docker:29-cli
    commands:
      - docker run --rm media-metadata-dataset:ci pyright
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  pytest:
    image: docker:29-cli
    commands:
      - docker run --rm media-metadata-dataset:ci pytest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

  keyless-smoke-artifact:
    image: docker:29-cli
    commands:
      - mkdir -p .mod/out
      - docker run --rm -v "$PWD/.mod/out:/app/.mod/out" media-metadata-dataset:ci mod smoke-artifact --output-dir .mod/out/keyless-smoke
      - ls -la .mod/out/keyless-smoke
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
